<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秒杀系统架构动画 — 第122章可视化演示</title>
<!-- CDN: d3.js v7 (备用: 离线版见 https://d3js.org/d3.v7.min.js) -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #f8f9fa;
  --card-bg: #ffffff;
  --text: #2d3436;
  --border: #dee2e6;
  --primary: #0984e3;
  --success: #00b894;
  --danger: #d63031;
  --warning: #fdcb6e;
  --muted: #636e72;
  --node-fill: #dfe6e9;
  --node-stroke: #b2bec3;
  --line-color: #b2bec3;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --card-bg: #16213e;
  --text: #dfe6e9;
  --border: #2d3436;
  --node-fill: #2d3436;
  --node-stroke: #636e72;
  --line-color: #636e72;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 1.4rem; }
.theme-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text);
}
.theme-btn:hover { opacity: 0.8; }
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 20px 24px;
}
.desc { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; }
.desc a { color: var(--primary); }
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.controls button {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  cursor: pointer;
  font-size: 0.9rem;
}
.controls button:hover { opacity: 0.85; }
.controls button:disabled { opacity: 0.4; cursor: not-allowed; }
.step-indicator {
  font-size: 0.85rem;
  color: var(--muted);
  margin-left: 8px;
}
svg { width: 100%; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); }
.step-desc {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  min-height: 44px;
}
.step-detail {
  margin-top: 6px;
  padding: 8px 14px;
  background: #ffeaa7;
  border-radius: 6px;
  font-size: 0.85rem;
  color: #2d3436;
}
[data-theme="dark"] .step-detail { background: #2d3436; color: #dfe6e9; }
.footer {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 20px;
  font-size: 0.8rem;
  color: var(--muted);
}
.footer a { color: var(--primary); }
</style>
</head>
<body>
<div class="header">
  <h1>秒杀系统架构 — 请求处理流程</h1>
  <button class="theme-btn" onclick="toggleTheme()">🌓 暗色/亮色</button>
</div>
<div class="container">
  <p class="desc">
    本可视化对应 <a href="122-项目四电商秒杀系统.md">第122章：电商秒杀系统</a> 步骤122.1-122.11。<br>
    展示一次秒杀请求从用户到数据库的完整链路。
  </p>
  <div class="controls">
    <button id="prevBtn" onclick="prevStep()">◀ 上一步</button>
    <button id="nextBtn" onclick="nextStep()">下一步 ▶</button>
    <button id="resetBtn" onclick="resetAll()">↺ 重置</button>
    <span class="step-indicator" id="stepLabel">步骤 1/7</span>
  </div>
  <svg id="arch"></svg>
  <div class="step-desc" id="stepDesc">点击"下一步"开始演示</div>
  <div class="step-detail" id="stepDetail"></div>
</div>
<div class="footer">
  数据来源：基于 122-项目四电商秒杀系统.md（第122章教程）| 自包含HTML，可离线运行
</div>

<script>
const W = 1050, H = 620;
const svg = d3.select("#arch").attr("viewBox", `0 0 ${W} ${H}`);

const g = svg.append("g");

const styles = getComputedStyle(document.documentElement);
const primary = styles.getPropertyValue("--primary").trim();
const success = styles.getPropertyValue("--success").trim();
const danger  = styles.getPropertyValue("--danger").trim();
const warning = styles.getPropertyValue("--warning").trim();
const muted   = styles.getPropertyValue("--muted").trim();
const nodeFill = styles.getPropertyValue("--node-fill").trim();
const nodeStroke = styles.getPropertyValue("--node-stroke").trim();
const lineColor = styles.getPropertyValue("--line-color").trim();
const textColor = styles.getPropertyValue("--text").trim();

const layers = {
  client:   { x: 30,  w: 100, h: 80,  label: "用户请求\n(1000并发)", xoff: 20, yoff: 55 },
  nginx:    { x: 170, w: 100, h: 80,  label: "Nginx\n限流+静态页", xoff: 20, yoff: 55 },
  spring:   { x: 310, w: 100, h: 80,  label: "Spring Boot\n接口层", xoff: 20, yoff: 55 },
  redis:    { x: 450, w: 100, h: 80,  label: "Redis\n原子减库存", xoff: 20, yoff: 55 },
  rabbitmq: { x: 590, w: 100, h: 80,  label: "RabbitMQ\n消息队列", xoff: 20, yoff: 55 },
  consumer: { x: 730, w: 100, h: 80,  label: "Order\nConsumer", xoff: 20, yoff: 55 },
  mysql:    { x: 870, w: 100, h: 80,  label: "MySQL\n持久化订单", xoff: 20, yoff: 55 }
};

const yPos = 160;

function drawNode(key, data) {
  const gNode = g.append("g");
  gNode.append("rect")
    .attr("x", data.x).attr("y", yPos)
    .attr("width", data.w).attr("height", data.h)
    .attr("rx", 8).attr("ry", 8)
    .attr("fill", nodeFill).attr("stroke", nodeStroke).attr("stroke-width", 2);
  gNode.append("text")
    .attr("x", data.x + data.xoff).attr("y", yPos + data.yoff)
    .attr("text-anchor", "middle")
    .attr("fill", textColor).attr("font-size", 13)
    .html(data.label.replace(/\n/g, "<tspan x='"+(data.x+data.xoff)+"' dy='18'>"));
  return gNode;
}

function drawArrow(x1, y1, x2, y2, color) {
  g.append("line")
    .attr("x1", x1).attr("y1", y1)
    .attr("x2", x2).attr("y2", y2)
    .attr("stroke", color).attr("stroke-width", 2)
    .attr("marker-end", "url(#arrow)");
}

function drawActiveArrow(x1, y1, x2, y2) {
  const id = "animArrow" + Date.now();
  g.append("defs").append("marker")
    .attr("id", id).attr("viewBox", "0 0 10 10").attr("refX", 9).attr("refY", 5)
    .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
    .append("path").attr("d", "M0,0 L10,5 L0,10 Z").attr("fill", primary);
  g.append("line")
    .attr("x1", x1).attr("y1", y1)
    .attr("x2", x2).attr("y2", y2)
    .attr("stroke", primary).attr("stroke-width", 3)
    .attr("marker-end", "url(#" + id + ")")
    .attr("stroke-dasharray", "8,4")
    .append("animate").attr("attributeName", "stroke-dashoffset")
    .attr("from", "24").attr("to", "0").attr("dur", "0.8s").attr("repeatCount", "indefinite");
}

const allKeys = ["client","nginx","spring","redis","rabbitmq","consumer","mysql"];
allKeys.forEach(k => drawNode(k, layers[k]));

const midY = yPos + 40;
const arrows = [
  { from: "client", to: "nginx",    x1: 130, x2: 170, y1: midY, y2: midY },
  { from: "nginx", to: "spring",    x1: 270, x2: 310, y1: midY, y2: midY },
  { from: "spring", to: "redis",    x1: 410, x2: 450, y1: midY, y2: midY },
  { from: "spring", to: "rabbitmq", x1: 360, x2: 590, y1: yPos+110, y2: midY },
  { from: "rabbitmq", to: "consumer", x1: 690, x2: 730, y1: midY, y2: midY },
  { from: "consumer", to: "mysql",  x1: 830, x2: 870, y1: midY, y2: midY },
];

const steps = [
  { nodes: [], arrows: [], desc: "准备就绪。所有组件待命中。", detail: "" },
  { nodes: ["client"], arrows: [{...arrows[0],color:primary}], desc: "【步骤1】大量用户并发请求到达 Nginx。", detail: "Nginx 做第一层限流（limit_req），过滤掉超频请求。" },
  { nodes: ["client","nginx"], arrows: [{...arrows[0],color:success},{...arrows[1],color:primary}], desc: "【步骤2】Nginx 将合法请求转发到 Spring Boot 接口层。", detail: "Spring Boot Controller 接收请求，提取 userId 和 productId。" },
  { nodes: ["client","nginx","spring"], arrows: [{...arrows[0],color:success},{...arrows[1],color:success},{...arrows[2],color:primary}], desc: "【步骤3】Spring Boot 调用 Redis 执行 Lua 脚本原子减库存。", detail: "Lua 脚本：GET stock → 判断 >0 → DECR stock。一个命令完成，无竞态。" },
  { nodes: ["client","nginx","spring","redis"], arrows: [{...arrows[0],color:success},{...arrows[1],color:success},{...arrows[2],color:success},{...arrows[3],color:primary}], desc: "【步骤4】扣库存成功后，发送消息到 RabbitMQ 队列。", detail: "消息内容：productId:userId。队列起削峰填谷作用。" },
  { nodes: ["client","nginx","spring","redis","rabbitmq"], arrows: [{...arrows[0],color:success},{...arrows[1],color:success},{...arrows[2],color:success},{...arrows[3],color:success},{...arrows[4],color:primary}], desc: "【步骤5】OrderConsumer 从队列消费消息，创建订单。", detail: "Consumer 按自己的处理能力逐条消费，避免 MySQL 瞬时压力。" },
  { nodes: allKeys, arrows: [{...arrows[0],color:success},{...arrows[1],color:success},{...arrows[2],color:success},{...arrows[3],color:success},{...arrows[4],color:success},{...arrows[5],color:primary}], desc: "【步骤6】Consumer 写 MySQL：扣库存（乐观锁）+ 创建订单。", detail: "MySQL 使用 @Version 乐观锁再次保证不超卖。最终 Redis 库存 = MySQL 库存。" },
];

let currentStep = 0;

function renderStep(n) {
  currentStep = n;
  const step = steps[n];
  g.selectAll(".highlight").remove();

  step.nodes.forEach(k => {
    const d = layers[k];
    g.append("rect").attr("class", "highlight")
      .attr("x", d.x-3).attr("y", yPos-3)
      .attr("width", d.w+6).attr("height", d.h+6)
      .attr("rx", 10).attr("ry", 10)
      .attr("fill", "none").attr("stroke", primary).attr("stroke-width", 3)
      .attr("opacity", 0.6);
  });

  step.arrows.forEach(a => {
    drawArrow(a.x1, a.y1, a.x2, a.y2, a.color);
  });

  document.getElementById("stepDesc").textContent = step.desc;
  document.getElementById("stepDetail").textContent = step.detail;
  document.getElementById("stepLabel").textContent = `步骤 ${n}/6`;
  document.getElementById("prevBtn").disabled = (n === 0);
  document.getElementById("nextBtn").disabled = (n === 6);
}

function nextStep() { if (currentStep < 6) renderStep(currentStep + 1); }
function prevStep() { if (currentStep > 0) renderStep(currentStep - 1); }
function resetAll() { renderStep(0); }

function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute("data-theme", html.getAttribute("data-theme") === "dark" ? "light" : "dark");
}

renderStep(0);
</script>
</body>
</html>
