{% extends "base.html" %}

{% block content %}
  {% if page.url == "" or page.url == "/" or page.url == "index.html" %}
  {# 首页：完全自定义布局，不显示 MkDocs 侧栏 #}
  <div class="md-content md-content--home" data-md-component="content">
    <article class="md-content__inner md-typeset home-page">
      {{ page.content }}
    </article>
  </div>
  {% else %}
  {{ super() }}
  {% endif %}
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  var searchTrigger = document.querySelector('.sb-search');
  if (searchTrigger) {
    searchTrigger.addEventListener('click', function() {
      var searchInput = document.querySelector('.md-search__input');
      if (searchInput) searchInput.focus();
    });
  }
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      var searchInput = document.querySelector('.md-search__input');
      if (searchInput) searchInput.focus();
    }
  });

  // 首页隐藏 MkDocs 默认侧栏（:has() fallback）
  var homeContent = document.querySelector('.md-content--home');
  if (homeContent) {
    var mainInner = homeContent.closest('.md-main__inner');
    if (mainInner) {
      var sidebars = mainInner.querySelectorAll(':scope > .md-sidebar');
      sidebars.forEach(function(sb) { sb.style.display = 'none'; });
      mainInner.style.maxWidth = 'none';
      homeContent.style.maxWidth = 'none';
      homeContent.style.width = '100%';
      var inner = homeContent.querySelector('.md-content__inner');
      if (inner) {
        inner.style.maxWidth = 'none';
        inner.style.padding = '0';
        inner.style.margin = '0';
      }
    }
  }
});
</script>
{% endblock %}
