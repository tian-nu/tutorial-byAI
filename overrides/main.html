{% extends "base.html" %}

{% block content %}
  {% if page.url == "" or page.url == "/" or page.url == "index.html" %}
  {# 首页：完全自定义布局，不显示 MkDocs 侧栏 #}
  <div class="md-content md-content--home" data-md-component="content">
    <article class="md-content__inner md-typeset home-page">
      {{ page.content }}
    </article>
  </div>
  {% else %}
  {{ super() }}
  {% endif %}
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function() {
  // ============================================================
  // 事件委托：绑定在 document 上，不受 MkDocs instant loading
  // DOM 替换影响，只绑定一次，永久有效
  // ============================================================

  // 搜索按钮（委托）
  document.addEventListener('click', function(e) {
    if (e.target.closest('.sb-search')) {
      var searchBtn = document.querySelector('.md-search__open');
      if (searchBtn) {
        searchBtn.click();
      } else {
        var si = document.querySelector('.md-search__input');
        if (si) si.focus();
      }
    }
  });

  // 侧边栏分类筛选（委托）
  document.addEventListener('click', function(e) {
    var item = e.target.closest('.home-sidebar .sb-item');
    if (!item) return;
    // 跳过带 <a> 标签的导航项（如"学习路径"）
    if (item.querySelector('a')) return;

    var filter = item.textContent.trim();
    filter = filter.replace(/\d+\s*$/, '').trim();

    var cards = document.querySelectorAll('.t-card');
    var dividers = document.querySelectorAll('.divider');

    if (filter === '全部教程') {
      document.querySelectorAll('.home-sidebar .sb-item').forEach(function(i) {
        i.classList.remove('active');
      });
      item.classList.add('active');
      cards.forEach(function(c) { c.style.display = ''; });
      dividers.forEach(function(d) { d.style.display = ''; });
      return;
    }

    document.querySelectorAll('.home-sidebar .sb-item').forEach(function(i) {
      i.classList.remove('active');
    });
    item.classList.add('active');

    cards.forEach(function(c) { c.style.display = 'none'; });
    dividers.forEach(function(d) { d.style.display = 'none'; });

    dividers.forEach(function(div) {
      var label = div.querySelector('.divider-label');
      if (label && label.textContent.trim() === filter) {
        div.style.display = '';
        var next = div.nextElementSibling;
        while (next && !next.classList.contains('divider')) {
          if (next.classList.contains('t-list')) {
            next.querySelectorAll('.t-card').forEach(function(c) { c.style.display = ''; });
          }
          next = next.nextElementSibling;
        }
      }
    });
  });

  // Ctrl+K 快捷键
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      var searchBtn = document.querySelector('.md-search__open');
      if (searchBtn) {
        searchBtn.click();
      } else {
        var si = document.querySelector('.md-search__input');
        if (si) si.focus();
      }
    }
  });

  // ============================================================
  // 布局调整：每次导航（含 instant loading）都需要重新执行
  // ============================================================
  function adjustLayout() {
    // 首页：隐藏 MkDocs 默认侧栏
    var homeContent = document.querySelector('.md-content--home');
    if (homeContent) {
      var mainInner = homeContent.closest('.md-main__inner');
      if (mainInner) {
        mainInner.querySelectorAll(':scope > .md-sidebar').forEach(function(sb) { sb.style.display = 'none'; });
        mainInner.style.maxWidth = 'none';
        homeContent.style.maxWidth = 'none';
        homeContent.style.width = '100%';
        var inner = homeContent.querySelector('.md-content__inner');
        if (inner) {
          inner.style.maxWidth = 'none';
          inner.style.padding = '0';
          inner.style.margin = '0';
        }
      }
    }

    // 教程子首页（章节列表 ch-grid）：铺满宽度
    var hasChGrid = document.querySelector('.ch-grid');
    if (hasChGrid) {
      var contentArea = document.querySelector('.md-content');
      var typeset = document.querySelector('.md-typeset');
      if (contentArea) contentArea.style.maxWidth = 'none';
      if (typeset) typeset.style.maxWidth = 'none';
    }
  }

  // 初始加载
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', adjustLayout);
  } else {
    adjustLayout();
  }

  // MkDocs Material instant loading：每次导航后重新调整布局
  if (typeof document$ !== 'undefined') {
    document$.subscribe(function() {
      // 延迟一帧，确保 MkDocs 完成 DOM 替换
      requestAnimationFrame(function() {
        adjustLayout();
      });
    });
  }
})();
</script>
{% endblock %}
