<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二次函数与不等式 - 交互演示</title>
<style>
:root {
  --bg: #f8fafc;
  --text: #1e293b;
  --card: #ffffff;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  --green: #059669;
  --green-light: #10B981;
  --green-bg: #ECFDF5;
  --dark-green: #064E3B;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 850px;
  width: 100%;
  background: var(--card);
  border-radius: 12px;
  padding: 24px;
  box-shadow: var(--shadow);
}

h1 { text-align: center; color: var(--green); margin-bottom: 8px; font-size: 1.8rem; }

.description { text-align: center; margin-bottom: 16px; opacity: 0.8; }

.sliders {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.slider-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.slider-group label {
  font-weight: 600;
  font-size: 0.9rem;
}

.slider-group input[type="range"] {
  width: 100%;
  accent-color: var(--green);
}

.slider-group span {
  font-size: 0.85rem;
  opacity: 0.8;
}

.info-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
  background: var(--green-bg);
  padding: 14px;
  border-radius: 8px;
}

.info-item {
  text-align: center;
  font-size: 0.9rem;
}

.info-item strong {
  display: block;
  color: var(--green);
  font-size: 1.1rem;
  margin-bottom: 2px;
}

#canvas-container {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}

canvas {
  border: 2px solid var(--green);
  border-radius: 8px;
  background: var(--bg);
  max-width: 100%;
}

.inequality-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}

.inequality-controls button {
  padding: 8px 14px;
  border: 2px solid var(--green);
  background: transparent;
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.85rem;
}

.inequality-controls button:hover, .inequality-controls button.active {
  background: var(--green);
  color: white;
}

footer {
  text-align: center;
  opacity: 0.7;
  font-size: 0.85rem;
  margin-top: 16px;
}

.theme-toggle {
  position: fixed; top: 16px; right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  border: 2px solid var(--green);
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌓</button>

<div class="container">
  <h1>二次函数与一元二次方程、不等式</h1>
  <p class="description">调整系数观察抛物线变化，理解根、顶点与不等式解集的关系</p>

  <div class="sliders">
    <div class="slider-group">
      <label>a (开口系数): <span id="aVal">1</span></label>
      <input type="range" id="sliderA" min="-5" max="5" step="0.1" value="1">
    </div>
    <div class="slider-group">
      <label>b (一次项系数): <span id="bVal">0</span></label>
      <input type="range" id="sliderB" min="-10" max="10" step="0.1" value="0">
    </div>
    <div class="slider-group">
      <label>c (常数项): <span id="cVal">-4</span></label>
      <input type="range" id="sliderC" min="-10" max="10" step="0.1" value="-4">
    </div>
  </div>

  <div class="info-panel">
    <div class="info-item"><strong id="deltaVal">16</strong>判别式 Δ = b² - 4ac</div>
    <div class="info-item"><strong id="vertexVal">(0.00, -4.00)</strong>顶点坐标</div>
    <div class="info-item"><strong id="rootsVal">x₁=2.00, x₂=-2.00</strong>与x轴交点</div>
    <div class="info-item"><strong id="axisVal">x = 0.00</strong>对称轴</div>
  </div>

  <div class="inequality-controls">
    <span style="opacity:0.7;align-self:center">高亮解集：</span>
    <button class="ieq-btn active" data-mode="none">无</button>
    <button class="ieq-btn" data-mode="gt0">f(x) &gt; 0</button>
    <button class="ieq-btn" data-mode="lt0">f(x) &lt; 0</button>
    <button class="ieq-btn" data-mode="gte0">f(x) ≥ 0</button>
    <button class="ieq-btn" data-mode="lte0">f(x) ≤ 0</button>
  </div>

  <div id="canvas-container">
    <canvas id="canvas" width="700" height="450"></canvas>
  </div>

  <footer>
    <p>基于人教版高中数学必修第一册（2019版）</p>
    <p>对应教程 09-二次函数与一元二次方程不等式</p>
  </footer>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let a = 1, b = 0, c = -4;
let ieqMode = 'none';
let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

const MARGIN = 50;
const XMIN = -6, XMAX = 6;

function toWorldX(px) { return XMIN + (px - MARGIN) / (canvas.width - 2 * MARGIN) * (XMAX - XMIN); }
function toScreenX(x) { return MARGIN + (x - XMIN) / (XMAX - XMIN) * (canvas.width - 2 * MARGIN); }
function toScreenY(y) { return MARGIN + (YMAX - y) / (YMAX - YMIN) * (canvas.height - 2 * MARGIN); }
function toWorldY(py) { return YMAX - (py - MARGIN) / (canvas.height - 2 * MARGIN) * (YMAX - YMIN); }

let YMIN = -10, YMAX = 10;

function f(x) { return a * x * x + b * x + c; }

function computeYRange() {
  let minY = Infinity, maxY = -Infinity;
  const step = (XMAX - XMIN) / 200;
  for (let x = XMIN; x <= XMAX; x += step) {
    const y = f(x);
    if (y < minY) minY = y;
    if (y > maxY) maxY = y;
  }
  const pad = Math.max(2, (maxY - minY) * 0.3);
  YMIN = Math.floor(minY - pad);
  YMAX = Math.ceil(maxY + pad);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  computeYRange();

  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text');
  const axisColor = isDark ? '#64748b' : '#94a3b8';
  const gridColor = isDark ? '#334155' : '#e2e8f0';

  // 网格
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for (let x = Math.ceil(XMIN); x <= XMAX; x++) {
    const sx = toScreenX(x);
    ctx.beginPath(); ctx.moveTo(sx, MARGIN); ctx.lineTo(sx, canvas.height - MARGIN); ctx.stroke();
  }
  for (let y = Math.ceil(YMIN); y <= YMAX; y++) {
    const sy = toScreenY(y);
    ctx.beginPath(); ctx.moveTo(MARGIN, sy); ctx.lineTo(canvas.width - MARGIN, sy); ctx.stroke();
  }

  // 坐标轴
  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 2;
  const sx0 = toScreenX(0), sy0 = toScreenY(0);
  ctx.beginPath(); ctx.moveTo(MARGIN, sy0); ctx.lineTo(canvas.width - MARGIN, sy0); ctx.stroke(); // x轴
  ctx.beginPath(); ctx.moveTo(sx0, MARGIN); ctx.lineTo(sx0, canvas.height - MARGIN); ctx.stroke(); // y轴

  // 箭头
  ctx.fillStyle = axisColor;
  ctx.beginPath(); ctx.moveTo(canvas.width - MARGIN, sy0); ctx.lineTo(canvas.width - MARGIN - 8, sy0 - 4); ctx.lineTo(canvas.width - MARGIN - 8, sy0 + 4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(sx0, MARGIN); ctx.lineTo(sx0 - 4, MARGIN + 8); ctx.lineTo(sx0 + 4, MARGIN + 8); ctx.fill();

  // 刻度标签
  ctx.fillStyle = textColor;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let x = Math.ceil(XMIN); x <= XMAX; x++) {
    if (x === 0) continue;
    ctx.fillText(x, toScreenX(x), sy0 + 6);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let y = Math.ceil(YMIN); y <= YMAX; y++) {
    if (y === 0) continue;
    ctx.fillText(y, sx0 - 6, toScreenY(y));
  }

  // 判别式
  const delta = b * b - 4 * a * c;
  const vertexX = -b / (2 * a);
  const vertexY = f(vertexX);

  // 不等式解集高亮
  if (a !== 0 && ieqMode !== 'none') {
    const highlightAreas = [];
    if (delta > 0 && Math.abs(a) > 0.001) {
      const x1 = (-b - Math.sqrt(delta)) / (2 * a);
      const x2 = (-b + Math.sqrt(delta)) / (2 * a);
      const roots = [Math.min(x1, x2), Math.max(x1, x2)];
      if (ieqMode === 'gt0' || ieqMode === 'gte0') {
        if (a > 0) {
          highlightAreas.push([XMIN, roots[0]]);
          highlightAreas.push([roots[1], XMAX]);
        } else {
          highlightAreas.push([roots[0], roots[1]]);
        }
      } else if (ieqMode === 'lt0' || ieqMode === 'lte0') {
        if (a > 0) {
          highlightAreas.push([roots[0], roots[1]]);
        } else {
          highlightAreas.push([XMIN, roots[0]]);
          highlightAreas.push([roots[1], XMAX]);
        }
      }
    } else if (delta === 0 && Math.abs(a) > 0.001) {
      const x0 = -b / (2 * a);
      if (ieqMode === 'gt0' || ieqMode === 'gte0') {
        if (a > 0) {
          highlightAreas.push([XMIN, x0]);
          highlightAreas.push([x0, XMAX]);
        }
      } else if (ieqMode === 'lt0' || ieqMode === 'lte0') {
        if (a < 0) {
          highlightAreas.push([XMIN, x0]);
          highlightAreas.push([x0, XMAX]);
        }
      }
    } else if (delta < 0 || Math.abs(a) < 0.001) {
      if (ieqMode === 'gt0' || ieqMode === 'gte0') {
        if (a > 0) highlightAreas.push([XMIN, XMAX]);
      } else if (ieqMode === 'lt0' || ieqMode === 'lte0') {
        if (a < 0) highlightAreas.push([XMIN, XMAX]);
      }
    }

    ctx.fillStyle = isDark ? 'rgba(5, 150, 105, 0.25)' : 'rgba(5, 150, 105, 0.2)';
    for (const [lx, rx] of highlightAreas) {
      ctx.fillRect(toScreenX(lx), MARGIN, toScreenX(rx) - toScreenX(lx), canvas.height - 2 * MARGIN);
    }
  }

  // 抛物线（必要时分段防止除零等）
  ctx.strokeStyle = '#10B981';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const step = (XMAX - XMIN) / 400;
  let first = true;
  for (let x = XMIN; x <= XMAX; x += step) {
    const y = f(x);
    if (Math.abs(y) > 1e6) {
      first = true;
      continue;
    }
    const sx = toScreenX(x), sy = toScreenY(y);
    if (sy < MARGIN - 200 || sy > canvas.height - MARGIN + 200) { first = true; continue; }
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else { ctx.lineTo(sx, sy); }
  }
  ctx.stroke();

  // 顶点
  const vx = toScreenX(vertexX), vy = toScreenY(vertexY);
  ctx.fillStyle = '#2563eb';
  ctx.beginPath(); ctx.arc(vx, vy, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = textColor;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`顶点(${vertexX.toFixed(2)},${vertexY.toFixed(2)})`, vx + 8, vy - 6);

  // 对称轴（虚线）
  const axisX = toScreenX(vertexX);
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(axisX, MARGIN); ctx.lineTo(axisX, canvas.height - MARGIN); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#a855f7';
  ctx.fillText(`x=${vertexX.toFixed(2)}`, axisX + 4, MARGIN + 16);

  // 与x轴交点
  if (delta >= 0 && Math.abs(a) > 0.001) {
    const sd = Math.sqrt(delta);
    const r1 = (-b - sd) / (2 * a), r2 = (-b + sd) / (2 * a);
    [r1, r2].forEach(r => {
      if (r >= XMIN && r <= XMAX) {
        const rx = toScreenX(r), ry = toScreenY(0);
        ctx.fillStyle = '#ef4444';
        ctx.beginPath(); ctx.arc(rx, ry, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = textColor;
        ctx.fillText(`(${r.toFixed(2)},0)`, rx + 8, ry + 16);
      }
    });
  }

  // O 标签
  ctx.fillStyle = textColor;
  ctx.fillText('O', sx0 - 12, sy0 + 12);
}

function updateInfo() {
  const delta = b * b - 4 * a * c;
  const vx = -b / (2 * a);
  const vy = f(vx);
  document.getElementById('deltaVal').textContent = delta.toFixed(2);
  document.getElementById('vertexVal').textContent = `(${vx.toFixed(2)}, ${vy.toFixed(2)})`;
  document.getElementById('axisVal').textContent = `x = ${vx.toFixed(2)}`;
  if (delta > 0 && Math.abs(a) > 0.001) {
    const sd = Math.sqrt(delta);
    const r1 = (-b - sd) / (2 * a), r2 = (-b + sd) / (2 * a);
    document.getElementById('rootsVal').textContent = `x₁=${r1.toFixed(2)}, x₂=${r2.toFixed(2)}`;
  } else if (Math.abs(delta) < 0.001 && Math.abs(a) > 0.001) {
    document.getElementById('rootsVal').textContent = `x=${(-b/(2*a)).toFixed(2)} (重根)`;
  } else {
    document.getElementById('rootsVal').textContent = '无实数根';
  }
}

document.getElementById('sliderA').addEventListener('input', function() {
  a = parseFloat(this.value);
  document.getElementById('aVal').textContent = a.toFixed(1);
  updateInfo(); draw();
});
document.getElementById('sliderB').addEventListener('input', function() {
  b = parseFloat(this.value);
  document.getElementById('bVal').textContent = b.toFixed(1);
  updateInfo(); draw();
});
document.getElementById('sliderC').addEventListener('input', function() {
  c = parseFloat(this.value);
  document.getElementById('cVal').textContent = c.toFixed(1);
  updateInfo(); draw();
});

document.querySelectorAll('.ieq-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.ieq-btn.active').classList.remove('active');
    btn.classList.add('active');
    ieqMode = btn.dataset.mode;
    draw();
  });
});

document.getElementById('themeToggle').addEventListener('click', () => {
  isDark = !isDark;
  if (isDark) {
    document.documentElement.style.setProperty('--bg', '#0f172a');
    document.documentElement.style.setProperty('--text', '#f1f5f9');
    document.documentElement.style.setProperty('--card', '#1e293b');
    document.documentElement.style.setProperty('--green-bg', '#064e3b');
  } else {
    document.documentElement.style.setProperty('--bg', '#f8fafc');
    document.documentElement.style.setProperty('--text', '#1e293b');
    document.documentElement.style.setProperty('--card', '#ffffff');
    document.documentElement.style.setProperty('--green-bg', '#ECFDF5');
  }
  draw();
});

draw();
updateInfo();
</script>
</body>
</html>
