site_name: GO从零到后端教程
site_description: 零基础到Go后端工程师的完整学习路径
site_author: tian-nu
site_url: https://tian-nu.github.io/tutorial-byAI/

repo_name: tian-nu/tutorial-byAI
repo_url: https://github.com/tian-nu/tutorial-byAI

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.instant      # 即时加载（SPA式导航）
    - navigation.tracking     # URL跟踪锚点
    - navigation.tabs         # 顶部标签页
    - navigation.sections     # 侧边栏按节折叠
    - navigation.expand       # 默认展开侧边栏
    - navigation.indexes      # 节首页
    - navigation.top          # 返回顶部按钮
    - search.suggest          # 搜索建议
    - search.highlight        # 搜索高亮
    - search.share            # 搜索分享
    - content.code.copy       # 代码复制按钮
    - content.code.annotate   # 代码注释
    - content.tabs.link       # 标签页链接
    - toc.follow              # 目录跟随滚动
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - awesome-pages
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      timezone: Asia/Shanghai

markdown_extensions:
  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # 格式增强
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tian-nu/tutorial-byAI
  analytics:
    feedback:
      title: 这篇内容有帮助吗？
      ratings:
        - icon: material/thumb-up-outline
          name: 有帮助
          data: 1
          note: 感谢反馈！
        - icon: material/thumb-down-outline
          name: 没帮助
          data: 0
          note: 感谢反馈，我们会持续改进！

extra_css:
  - stylesheets/extra.css

