<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>函数的单调性 - 交互演示</title>
<style>
:root {
  --bg: #f8fafc;
  --text: #1e293b;
  --card: #ffffff;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  --green: #059669;
  --green-light: #10B981;
  --green-bg: #ECFDF5;
  --dark-green: #064E3B;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 850px;
  width: 100%;
  background: var(--card);
  border-radius: 12px;
  padding: 24px;
  box-shadow: var(--shadow);
}

h1 { text-align: center; color: var(--green); margin-bottom: 8px; font-size: 1.8rem; }

.description { text-align: center; margin-bottom: 16px; opacity: 0.8; }

#canvas-container {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}

canvas {
  border: 2px solid var(--green);
  border-radius: 8px;
  background: var(--bg);
  max-width: 100%;
  cursor: pointer;
}

.info-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
  background: var(--green-bg);
  padding: 14px;
  border-radius: 8px;
}

.info-item {
  text-align: center;
  font-size: 0.9rem;
}

.info-item strong {
  display: block;
  color: var(--green);
  font-size: 1.1rem;
  margin-bottom: 2px;
}

.instructions {
  background: var(--green-bg);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  opacity: 0.8;
}

.interval-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}

.tag {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
}

.tag.inc { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.tag.dec { background: #fef2f2; color: #dc2626; border: 1px solid #dc2626; }

footer {
  text-align: center;
  opacity: 0.7;
  font-size: 0.85rem;
  margin-top: 16px;
}

.theme-toggle {
  position: fixed; top: 16px; right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  border: 2px solid var(--green);
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌓</button>

<div class="container">
  <h1>函数的单调性</h1>
  <p class="description">拖拽 x₁ 和 x₂ 观察函数值的变化，理解单调递增与单调递减</p>

  <div class="interval-tags">
    <span class="tag inc">↗ 递增区间: (-∞, -1)</span>
    <span class="tag dec">↘ 递减区间: (-1, 1)</span>
    <span class="tag inc">↗ 递增区间: (1, +∞)</span>
  </div>

  <div id="canvas-container">
    <canvas id="canvas" width="700" height="450"></canvas>
  </div>

  <div class="info-panel">
    <div class="info-item"><strong id="x1Val">未选择</strong>x₁ 坐标</div>
    <div class="info-item"><strong id="fx1Val">-</strong>f(x₁)</div>
    <div class="info-item"><strong id="x2Val">未选择</strong>x₂ 坐标</div>
    <div class="info-item"><strong id="fx2Val">-</strong>f(x₂)</div>
    <div class="info-item"><strong id="cmpVal">-</strong>x₁ &lt; x₂ 时比较</div>
  </div>

  <div class="instructions">
    <strong>操作说明：</strong>鼠标拖拽蓝色点 (x₁) 和红色点 (x₂) 沿 x 轴移动，观察函数值的变化关系。
    当 x₁ &lt; x₂ 时，若 f(x₁) &lt; f(x₂) 则函数在该区间单调递增；若 f(x₁) &gt; f(x₂) 则单调递减。
  </div>

  <footer>
    <p>基于人教版高中数学必修第一册（2019版）</p>
    <p>对应教程 12-函数的单调性与最大最小值</p>
  </footer>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const MARGIN = 50;
const XMIN = -3.5, XMAX = 3.5;
let YMIN = -5, YMAX = 5;

let x1 = -2.0, x2 = 2.0;
let dragging = null;

function f(x) { return x * x * x - 3 * x; }

function toScreenX(x) { return MARGIN + (x - XMIN) / (XMAX - XMIN) * (canvas.width - 2 * MARGIN); }
function toScreenY(y) { return MARGIN + (YMAX - y) / (YMAX - YMIN) * (canvas.height - 2 * MARGIN); }
function toWorldX(px) { return XMIN + (px - MARGIN) / (canvas.width - 2 * MARGIN) * (XMAX - XMIN); }
function toWorldY(py) { return YMAX - (py - MARGIN) / (canvas.height - 2 * MARGIN) * (YMAX - YMIN); }

function computeYRange() {
  let minY = Infinity, maxY = -Infinity;
  for (let i = 0; i <= 300; i++) {
    const x = XMIN + (XMAX - XMIN) * i / 300;
    const y = f(x);
    if (y < minY) minY = y;
    if (y > maxY) maxY = y;
  }
  const pad = Math.max(1.5, (maxY - minY) * 0.2);
  YMIN = Math.floor(minY - pad);
  YMAX = Math.ceil(maxY + pad);
}

let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  computeYRange();

  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text');
  const axisColor = isDark ? '#64748b' : '#94a3b8';
  const gridColor = isDark ? '#334155' : '#e2e8f0';

  // 网格
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for (let x = Math.ceil(XMIN); x <= XMAX; x++) {
    const sx = toScreenX(x);
    ctx.beginPath(); ctx.moveTo(sx, MARGIN); ctx.lineTo(sx, canvas.height - MARGIN); ctx.stroke();
  }
  for (let y = Math.ceil(YMIN); y <= YMAX; y++) {
    const sy = toScreenY(y);
    ctx.beginPath(); ctx.moveTo(MARGIN, sy); ctx.lineTo(canvas.width - MARGIN, sy); ctx.stroke();
  }

  const sx0 = toScreenX(0), sy0 = toScreenY(0);

  // 坐标轴
  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(MARGIN, sy0); ctx.lineTo(canvas.width - MARGIN, sy0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx0, MARGIN); ctx.lineTo(sx0, canvas.height - MARGIN); ctx.stroke();

  // 刻度
  ctx.fillStyle = textColor;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let x = Math.ceil(XMIN); x <= XMAX; x++) {
    if (x === 0) continue;
    ctx.fillText(x, toScreenX(x), sy0 + 6);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let y = Math.ceil(YMIN); y <= YMAX; y++) {
    if (y === 0) continue;
    ctx.fillText(y, sx0 - 6, toScreenY(y));
  }
  ctx.fillText('O', sx0 - 12, sy0 + 12);

  // 单调区间背景
  // 递减区间 (-1, 1) 用红色淡色
  const decX1 = toScreenX(-1), decX2 = toScreenX(1);
  ctx.fillStyle = isDark ? 'rgba(220, 38, 38, 0.08)' : 'rgba(220, 38, 38, 0.06)';
  ctx.fillRect(decX1, MARGIN, decX2 - decX1, canvas.height - 2 * MARGIN);

  // 递增区间用绿色淡色
  ctx.fillStyle = isDark ? 'rgba(5, 150, 105, 0.08)' : 'rgba(5, 150, 105, 0.06)';
  ctx.fillRect(MARGIN, MARGIN, decX1 - MARGIN, canvas.height - 2 * MARGIN);
  ctx.fillRect(decX2, MARGIN, canvas.width - MARGIN - decX2, canvas.height - 2 * MARGIN);

  // 函数曲线
  ctx.strokeStyle = '#10B981';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const step = (XMAX - XMIN) / 400;
  let first = true;
  for (let x = XMIN; x <= XMAX; x += step) {
    const y = f(x);
    const sx = toScreenX(x), sy = toScreenY(y);
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else { ctx.lineTo(sx, sy); }
  }
  ctx.stroke();

  // 极值点标注
  for (const xv of [-1, 1]) {
    const yv = f(xv);
    const px = toScreenX(xv), py = toScreenY(yv);
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = textColor;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`(${xv},${yv})`, px, py - 14);
  }

  // 绘制点 x1
  drawPoint(x1, '#2563eb', 'x₁');
  // 绘制点 x2
  drawPoint(x2, '#ef4444', 'x₂');

  updateInfo();
}

function drawPoint(x, color, label) {
  const y = f(x);
  const px = toScreenX(x), py = toScreenY(y);
  const sy0 = toScreenY(0);

  // 到x轴的虚线
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, sy0); ctx.stroke();
  ctx.setLineDash([]);

  // 到y轴的虚线
  ctx.beginPath();
  ctx.setLineDash([4, 3]);
  ctx.moveTo(toScreenX(0), py); ctx.lineTo(px, py); ctx.stroke();
  ctx.setLineDash([]);

  // 点
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 标签
  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text');
  ctx.fillStyle = textColor;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  const offset = label === 'x₁' ? -40 : 10;
  ctx.fillText(`${label}(${x.toFixed(2)},${y.toFixed(2)})`, px + offset, py - 14);
}

function updateInfo() {
  const y1 = f(x1), y2 = f(x2);
  document.getElementById('x1Val').textContent = x1.toFixed(2);
  document.getElementById('fx1Val').textContent = y1.toFixed(2);
  document.getElementById('x2Val').textContent = x2.toFixed(2);
  document.getElementById('fx2Val').textContent = y2.toFixed(2);

  if (x1 < x2) {
    if (y1 < y2) {
      document.getElementById('cmpVal').textContent = 'f(x₁) < f(x₂) → 递增';
      document.getElementById('cmpVal').style.color = '#059669';
    } else if (y1 > y2) {
      document.getElementById('cmpVal').textContent = 'f(x₁) > f(x₂) → 递减';
      document.getElementById('cmpVal').style.color = '#dc2626';
    } else {
      document.getElementById('cmpVal').textContent = 'f(x₁) = f(x₂)';
      document.getElementById('cmpVal').style.color = '';
    }
  } else if (x1 > x2) {
    document.getElementById('cmpVal').textContent = '请确保 x₁ < x₂';
    document.getElementById('cmpVal').style.color = '';
  } else {
    document.getElementById('cmpVal').textContent = 'x₁ = x₂';
    document.getElementById('cmpVal').style.color = '';
  }
}

// 鼠标事件
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const wx = toWorldX(mx);

  const dist1 = Math.hypot(mx - toScreenX(x1), my - toScreenY(f(x1)));
  const dist2 = Math.hypot(mx - toScreenX(x2), my - toScreenY(f(x2)));

  if (dist1 < 30 || dist2 < 30) {
    dragging = dist1 <= dist2 ? 'x1' : 'x2';
  } else {
    // 如果点击在x轴附近，允许从x轴选择
    const sy0 = toScreenY(0);
    if (Math.abs(my - sy0) < 40) {
      dragging = Math.abs(wx - x1) < Math.abs(wx - x2) ? 'x1' : 'x2';
    }
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  let wx = toWorldX(mx);
  wx = Math.max(XMIN, Math.min(XMAX, wx));
  if (dragging === 'x1') x1 = wx;
  else x2 = wx;
  draw();
});

canvas.addEventListener('mouseup', () => dragging = null);
canvas.addEventListener('mouseleave', () => dragging = null);

// 触摸支持
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
  const dist1 = Math.hypot(mx - toScreenX(x1), my - toScreenY(f(x1)));
  const dist2 = Math.hypot(mx - toScreenX(x2), my - toScreenY(f(x2)));
  const sy0 = toScreenY(0);
  const wx = toWorldX(mx);
  if (dist1 < 30 || dist2 < 30) {
    dragging = dist1 <= dist2 ? 'x1' : 'x2';
  } else if (Math.abs(my - sy0) < 40) {
    dragging = Math.abs(wx - x1) < Math.abs(wx - x2) ? 'x1' : 'x2';
  }
});

canvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  let wx = toWorldX(mx);
  wx = Math.max(XMIN, Math.min(XMAX, wx));
  if (dragging === 'x1') x1 = wx;
  else x2 = wx;
  draw();
});

canvas.addEventListener('touchend', () => dragging = null);

document.getElementById('themeToggle').addEventListener('click', () => {
  isDark = !isDark;
  if (isDark) {
    document.documentElement.style.setProperty('--bg', '#0f172a');
    document.documentElement.style.setProperty('--text', '#f1f5f9');
    document.documentElement.style.setProperty('--card', '#1e293b');
    document.documentElement.style.setProperty('--green-bg', '#064e3b');
  } else {
    document.documentElement.style.setProperty('--bg', '#f8fafc');
    document.documentElement.style.setProperty('--text', '#1e293b');
    document.documentElement.style.setProperty('--card', '#ffffff');
    document.documentElement.style.setProperty('--green-bg', '#ECFDF5');
  }
  draw();
});

draw();
</script>
</body>
</html>
